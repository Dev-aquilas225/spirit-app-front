server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # ACME challenge — laisser passer pour renouvellement SSL Traefik
    location ^~ /.well-known/acme-challenge/ {
        return 404;
    }

    # env-config.js — servi sans cache (généré au démarrage)
    location = /env-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        try_files /env-config.js =404;
    }

    # Assets statiques avec cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — ne pas rediriger vers les dossiers, toujours servir index.html
    location / {
        try_files $uri /index.html;
    }
}
