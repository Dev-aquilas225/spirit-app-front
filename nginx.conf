server {
    listen 80;
    server_name _;

    root /var/www/html;
    index index.html;

    # ── Compression ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # ── PWA : manifest et service worker ─────────────────────────────────────
    location = /manifest.json {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Content-Type "application/manifest+json";
        expires 0;
    }

    location = /service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
        access_log off;
    }

    # Expo génère parfois le SW sous ce nom
    location = /expo-service-worker.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires 0;
        access_log off;
    }

    # ── Assets statiques : cache long terme ──────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|mp4|webm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── SPA / Expo Router : toutes les routes → index.html ───────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # ── En-têtes de sécurité ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header X-XSS-Protection "1; mode=block";

    # ── Logs ──────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/spirit-app.access.log;
    error_log  /var/log/nginx/spirit-app.error.log warn;
}
