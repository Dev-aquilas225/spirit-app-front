name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: # permet de déclencher manuellement depuis GitHub

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true # annule un déploiement en cours si un nouveau push arrive

jobs:
  build-and-deploy:
    name: Build Expo Web + Deploy VPS
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Récupérer le code ───────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Node.js ────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package.json

      # ── 3. Installer les dépendances ──────────────────────────────────────
      - name: Install dependencies
        run: npm install
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      # ── 4. Build Expo Web ─────────────────────────────────────────────────
      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
          EXPO_PUBLIC_API_BASE_URL: ${{ secrets.EXPO_PUBLIC_API_BASE_URL }}
          EXPO_PUBLIC_APP_URL: ${{ secrets.EXPO_PUBLIC_APP_URL }}
          EXPO_PUBLIC_ADMIN_EMAIL: ${{ secrets.EXPO_PUBLIC_ADMIN_EMAIL }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID_WEB: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID_WEB }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID_IOS: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID_IOS }}
          EXPO_PUBLIC_GOOGLE_CLIENT_ID_ANDROID: ${{ secrets.EXPO_PUBLIC_GOOGLE_CLIENT_ID_ANDROID }}

      # ── 5. Post-process : inject __ENV__ + redirect racine ───────────────
      - name: Post-process dist
        run: |
          API_URL="${{ secrets.EXPO_PUBLIC_API_BASE_URL }}"
          VAPID_KEY="${{ secrets.VAPID_PUBLIC_KEY }}"
          ENV_JSON="{\"EXPO_PUBLIC_API_BASE_URL\":\"${API_URL}\",\"EXPO_PUBLIC_VAPID_PUBLIC_KEY\":\"${VAPID_KEY}\"}"
          ENV_SCRIPT="<script>window.__ENV__=${ENV_JSON};</script>"

          # Injecter dans tous les fichiers HTML
          find dist -name "*.html" | while read f; do
            sed -i "s|</head>|${ENV_SCRIPT}</head>|" "$f"
          done

          # Remplacer index.html par une redirection vers /home
          cat > dist/index.html << HTMLEOF
          <!DOCTYPE html><html lang="fr"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>Oracle Plus</title><script>window.__ENV__=${ENV_JSON};</script><script>window.location.replace('/home');</script></head><body></body></html>
          HTMLEOF

          test -f dist/home/index.html || (echo "❌ dist/home/index.html manquant" && exit 1)
          echo "✅ Build OK — $(du -sh dist | cut -f1)"

      # ── 6. Configurer la clé SSH ──────────────────────────────────────────
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      # ── 7. Déployer via rsync ─────────────────────────────────────────────
      - name: Deploy to VPS
        run: |
          rsync -avz --delete \
            --exclude='.DS_Store' \
            --exclude='*.map' \
            -e "ssh -i ~/.ssh/id_deploy -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ secrets.VPS_PATH }}/

      # ── 8. Recharger Nginx (si actif) ────────────────────────────────────
      - name: Reload Nginx
        run: |
          ssh -i ~/.ssh/id_deploy \
            -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
            "nginx -t && (systemctl is-active nginx && systemctl reload nginx && echo '✅ Nginx rechargé') || echo '⚠️ Nginx non actif (Traefik/Docker utilisé à la place) — fichiers déployés avec succès'"

      # ── 9. Nettoyage clé SSH ──────────────────────────────────────────────
      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/id_deploy
